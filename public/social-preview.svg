<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <rect width="1280" height="640" fill="#000000"/>
  <!-- Ö logo centered, scaled ~2.5x -->
  <g transform="translate(640, 290) scale(2.5) translate(-128, -116)" fill="#F7931A">
    <!-- Umlaut dots (eyes) -->
    <rect x="108" y="48" width="16" height="12"/>
    <rect x="132" y="48" width="16" height="12"/>
    <!-- Top horizontal -->
    <polygon points="96,78 104,72 152,72 160,78 152,84 104,84"/>
    <!-- Left vertical -->
    <polygon points="90,84 97,91 97,147 90,154 83,147 83,91"/>
    <!-- Right vertical -->
    <polygon points="166,84 173,91 173,147 166,154 159,147 159,91"/>
    <!-- Bottom horizontal -->
    <polygon points="96,178 104,172 152,172 160,178 152,184 104,184"/>
    <!-- Bottom-left corner joint -->
    <polygon points="96,160 104,168 96,176 88,168"/>
    <!-- Bottom-right corner joint -->
    <polygon points="160,160 168,168 160,176 152,168"/>
  </g>
  <!-- "Ötzi" text below logo -->
  <text x="640" y="530" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Consolas', monospace" font-size="36" fill="#F5F7FA" letter-spacing="0.15em">PERMAFROST VAULT</text>
</svg>
